name: CI/CD — GymFlow

# Déclenché à chaque push et pull request sur la branche main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Tests du backend Laravel
  # ─────────────────────────────────────────
  test-backend:
    name: Tests Backend (PHP / Laravel)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite, sqlite3
          coverage: xdebug

      - name: Installer les dépendances Composer
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copier le fichier d'environnement
        working-directory: backend
        run: cp .env.example .env

      - name: Générer la clé applicative Laravel
        working-directory: backend
        run: php artisan key:generate

      - name: Lancer les tests PHPUnit
        working-directory: backend
        run: php artisan test --coverage --min=60

  # ─────────────────────────────────────────
  # JOB 2 : Build du frontend React
  # ─────────────────────────────────────────
  test-frontend:
    name: Build Frontend (React / Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Installer les dépendances npm
        working-directory: frontend
        run: npm install

      - name: Vérifier le code (lint)
        working-directory: frontend
        run: npm run lint

      - name: Compiler le projet
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────
  # JOB 3 : Build Docker (vérification conteneurisation)
  # ─────────────────────────────────────────
  build-docker:
    name: Build image Docker backend
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Construire l'image Docker du backend
        working-directory: backend
        run: docker build -t gymflow-backend .

  # ─────────────────────────────────────────
  # JOB 4 : Déploiement sur Railway
  # ─────────────────────────────────────────
  deploy:
    name: Déploiement en production (Railway)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer la CLI Railway et Déployer
        uses: bervProject/railway-deploy-action@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "illustrious-integrity" 

  # ─────────────────────────────────────────
  # JOB 5 : Tests de charge (Artillery)
  # ─────────────────────────────────────────
  load-test:
    name: Tests de charge (Artillery)
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Artillery
        run: npm install -g artillery

      - name: Attendre le redémarrage de Railway
        run: |
          echo "Vérification de la disponibilité de Railway..."
          until [ $(curl -s -o /dev/null -w "%{http_code}" https://illustrious-integrity-production-e161.up.railway.app) -eq 200 ]; do
            echo "Railway est en cours de déploiement... attente de 5s"
            sleep 5
          done
          echo " Application en ligne !"

      - name: Lancer les tests de charge
        run: artillery run tests/load-test.yml --output tests/load-report.json

      - name: Afficher le rapport
        if: always()
        run: artillery report tests/load-report.json --output tests/load-report.html

      - name: Sauvegarder le rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests-charge
          path: tests/load-report.html